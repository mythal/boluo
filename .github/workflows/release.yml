name: Release
on:
  push:
    branches:
      - production
      - master
      # - release-*

env:
  DO_NOT_TRACK: 1
  NEXT_TELEMETRY_DISABLED: 1
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Nix Setup
        uses: ./.github/actions/nix-setup
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: /tmp/sccache
          key: ${{ runner.os }}-sccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Prepare restored sccache
        run: |
          mkdir -p /tmp/sccache
          sudo chown -R "$(id -u):$(id -g)" /tmp/sccache
          chmod -R a+rwX /tmp/sccache

      - name: Push images
        run: nix run --quiet --no-update-lock-file --print-build-logs ".#push-images"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          BRANCH_NAME: ${{ github.ref_name }}

      - name: Prepare sccache for caching
        if: ${{ always() }}
        run: |
          if [ -d /tmp/sccache ]; then
            sudo chown -R "$(id -u):$(id -g)" /tmp/sccache
            chmod -R u+rwX,go+rX /tmp/sccache
          fi

  staging:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: images
    if: github.ref == 'refs/heads/master'
    environment:
      name: staging
      url: https://boluo-site-staging.fly.dev
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Nix Setup
        uses: ./.github/actions/nix-setup
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Node.js Setup
        uses: ./.github/actions/node-setup

      - name: Build legacy
        run: npm run build:legacy

      - name: Build SPA
        run: npm run build:spa

      - name: Build Storybook
        run: npm run build:storybook

      - name: Build site Worker
        working-directory: apps/site
        run: npm --prefix ../.. run build:site && npx --yes @opennextjs/cloudflare build --skipNextBuild

      - name: Deploy site to staging
        run: nix run --quiet --no-update-lock-file .#deploy-site-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_IO_TOKEN }}

      - name: Deploy server to staging
        run: nix run --quiet --no-update-lock-file .#deploy-server-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_IO_TOKEN }}

      - name: Deploy legacy to staging
        working-directory: apps/legacy
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy SPA to staging
        working-directory: apps/spa
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Storybook
        working-directory: apps/storybook
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy site Worker to staging
        working-directory: apps/site
        run: npx @opennextjs/cloudflare deploy --env staging
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  production:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: images
    if: github.ref == 'refs/heads/production'
    environment:
      name: production
      url: https://site.boluochat.com
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Nix Setup
        uses: ./.github/actions/nix-setup
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Node.js Setup
        uses: ./.github/actions/node-setup

      - name: Build legacy
        run: npm run build:legacy

      - name: Build SPA
        run: npm run build:spa

      - name: Build site Worker
        working-directory: apps/site
        run: npm --prefix ../.. run build:site && npx --yes @opennextjs/cloudflare build --skipNextBuild

      - name: Deploy site to production
        run: nix run --quiet --no-update-lock-file .#deploy-site-production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_IO_TOKEN }}

      - name: Deploy server to production
        run: nix run --quiet --no-update-lock-file .#deploy-server-production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_IO_TOKEN }}

      - name: Deploy legacy to production
        working-directory: apps/legacy
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy SPA to production
        working-directory: apps/spa
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy site Worker to production
        working-directory: apps/site
        run: npx @opennextjs/cloudflare deploy --env production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
