name: Release
on:
  schedule:
    # 09:00 JST (GitHub Actions cron uses UTC).
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - production
      - main
      # - release-*
jobs:
  release-plan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      branch: ${{ steps.plan.outputs.branch }}
      deploy_staging: ${{ steps.plan.outputs.deploy_staging }}
      push_images: ${{ steps.plan.outputs.push_images }}
      sha: ${{ steps.plan.outputs.sha }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Plan release
        id: plan
        uses: actions/github-script@v7
        with:
          script: |
            const planRelease = require('./.github/scripts/release-plan.js');
            await planRelease({ github, context, core });

  images:
    needs: release-plan
    if: needs.release-plan.outputs.push_images == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-plan.outputs.sha }}

      - name: Nix Setup
        uses: ./.github/actions/nix-setup
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: /tmp/sccache
          key: ${{ runner.os }}-sccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Prepare restored sccache
        run: |
          mkdir -p /tmp/sccache
          sudo chown -R "$(id -u):$(id -g)" /tmp/sccache
          chmod -R a+rwX /tmp/sccache

      - name: Push images
        run: nix run --quiet --no-update-lock-file --print-build-logs ".#push-images"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          BRANCH_NAME: ${{ needs.release-plan.outputs.branch }}

      - name: Prepare sccache for caching
        if: ${{ always() }}
        run: |
          if [ -d /tmp/sccache ]; then
            sudo chown -R "$(id -u):$(id -g)" /tmp/sccache
            chmod -R u+rwX,go+rX /tmp/sccache
          fi

  staging:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: [release-plan, images]
    if: needs.release-plan.outputs.deploy_staging == 'true'
    environment:
      name: staging
      url: https://boluo-site-staging.fly.dev
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-plan.outputs.sha }}

      - name: Nix Setup
        uses: ./.github/actions/nix-setup
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Deploy site to staging
        run: nix run --quiet --no-update-lock-file .#deploy-site-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_IO_TOKEN }}

      - name: Deploy server to staging
        run: nix run --quiet --no-update-lock-file .#deploy-server-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_IO_TOKEN }}

  production:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: [release-plan, images]
    if: github.ref == 'refs/heads/production'
    environment:
      name: production
      url: https://site.boluochat.com
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-plan.outputs.sha }}

      - name: Nix Setup
        uses: ./.github/actions/nix-setup
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Deploy site to production
        run: nix run --quiet --no-update-lock-file .#deploy-site-production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_IO_TOKEN }}

      - name: Deploy server to production
        run: nix run --quiet --no-update-lock-file .#deploy-server-production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_IO_TOKEN }}
