name: Check
on:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches:
      - main
      - master
      - production

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

env:
  DO_NOT_TRACK: 1
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  cargo:
    name: Cargo Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Nix Setup
        uses: ./.github/actions/nix-setup
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Create sccache directory
        run: mkdir -p /tmp/sccache && chmod -R 777 /tmp/sccache

      - name: Cache sccache
        if: github.ref != 'refs/heads/production'
        uses: actions/cache@v5
        with:
          path: /tmp/sccache
          key: ${{ runner.os }}-sccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Prepare restored sccache
        run: |
          sudo chown -R "$(id -u):$(id -g)" /tmp/sccache
          chmod -R a+rwX /tmp/sccache

      - name: Check server
        run: nix build --print-build-logs ".#checks.x86_64-linux.server"

      - name: Prepare sccache for caching
        if: ${{ always() && github.ref != 'refs/heads/production' }}
        run: |
          if [ -d /tmp/sccache ]; then
            sudo chown -R "$(id -u):$(id -g)" /tmp/sccache
            chmod -R u+rwX,go+rX /tmp/sccache
          fi

  nodejs:
    name: Node.js Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Cache turbo build setup
        if: github.ref != 'refs/heads/production'
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build:deploy

      - name: Run tests
        run: npm run test

      - name: Check types
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Check version consistency
        run: npm run lint:versions
